# docker-compose.yml — federated-meetup self-host deployment.
#
# Usage:
#   1. Copy .env.example to .env and edit values.
#   2. Edit Caddyfile to set your domain.
#   3. docker compose up -d
#
# Services:
#   fedmeetup — the host daemon (ConnectRPC + web UI + MCP).
#   caddy     — reverse proxy with automatic HTTPS via ACME.

services:
  fedmeetup:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - fedmeetup-data:/data
    environment:
      - HOSTD_ADDR=:8080
      - HOSTD_GROUP_KEY=${HOSTD_GROUP_KEY:?HOSTD_GROUP_KEY is required}
      - HOSTD_NAME=${HOSTD_NAME:-hostd}
      - HOSTD_BASE_URL=${HOSTD_BASE_URL:-https://${DOMAIN:-localhost}}
      - HOSTD_DB_PATH=/data/fedmeetup.db
      - HOSTD_PROTOCOL_DB=/data/protocol.db
      - HOSTD_DESCRIPTION=${HOSTD_DESCRIPTION:-Federated Meetup host}
      - HOSTD_AREA=${HOSTD_AREA:-}
      - HOSTD_THRESHOLD=${HOSTD_THRESHOLD:-0}
      - HOSTD_PEERS=${HOSTD_PEERS:-}
      - HOSTD_SYNC_BOOTSTRAP=${HOSTD_SYNC_BOOTSTRAP:-true}
      - HOSTD_SYNC_LIVE=${HOSTD_SYNC_LIVE:-true}
    expose:
      - "8080"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - fedmeetup
    restart: unless-stopped

volumes:
  fedmeetup-data:
  caddy-data:
  caddy-config: