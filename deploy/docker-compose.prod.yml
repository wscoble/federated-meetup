# docker-compose.prod.yml — production deployment with TLS via Caddy.
#
# Usage:
#   DOMAIN=meetup.example.com docker compose -f deploy/docker-compose.prod.yml up -d
#
# This variant is identical to the root docker-compose.yml but:
#   - Configures Caddy with an ACME email for cert expiry notices.
#   - Uses restart: always instead of unless-stopped.
#   - Explicitly sets the Caddy ACME CA to Let's Encrypt.

services:
  fedmeetup:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      - fedmeetup-data:/data
    environment:
      - HOSTD_ADDR=:8080
      - HOSTD_GROUP_KEY=${HOSTD_GROUP_KEY:?HOSTD_GROUP_KEY is required}
      - HOSTD_NAME=${HOSTD_NAME:-hostd}
      - HOSTD_BASE_URL=${HOSTD_BASE_URL:-https://${DOMAIN:-localhost}}
      - HOSTD_DB_PATH=/data/fedmeetup.db
      - HOSTD_PROTOCOL_DB=/data/protocol.db
      - HOSTD_DESCRIPTION=${HOSTD_DESCRIPTION:-Federated Meetup host}
      - HOSTD_AREA=${HOSTD_AREA:-}
      - HOSTD_THRESHOLD=${HOSTD_THRESHOLD:-0}
      - HOSTD_PEERS=${HOSTD_PEERS:-}
      - HOSTD_SYNC_BOOTSTRAP=${HOSTD_SYNC_BOOTSTRAP:-true}
      - HOSTD_SYNC_LIVE=${HOSTD_SYNC_LIVE:-true}
    expose:
      - "8080"
    restart: always

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-admin@${DOMAIN:-localhost}}
    command: caddy run --config /etc/caddy/Caddyfile
    depends_on:
      - fedmeetup
    restart: always

volumes:
  fedmeetup-data:
  caddy-data:
  caddy-config: