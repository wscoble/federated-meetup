# Kubernetes Secret for federated-meetup
#
# Create this BEFORE applying deployment.yaml.
# NEVER commit real secret values — this file uses stringData placeholders.
# In production, use sealed-secrets, external-secrets, or kubectl directly:
#
#   kubectl -n fedmeetup create secret generic fedmeetup-secrets \
#     --from-literal=HOSTD_GROUP_KEY='0xYOUR_HEX_KEY' \
#     --from-literal=STRIPE_SECRET_KEY='sk_live_xxx' \
#     --from-literal=HOSTD_SMTP_HOST='smtp.example.com' \
#     --from-literal=HOSTD_SMTP_PORT='587' \
#     --from-literal=HOSTD_SMTP_USER='user@example.com' \
#     --from-literal=HOSTD_SMTP_PASS='password' \
#     --from-literal=HOSTD_SMTP_FROM='noreply@example.com'
#
# For local dev / testing, you can apply this file with dummy values:
#   kubectl apply -f deploy/k8s/secret.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: fedmeetup-secrets
  namespace: fedmeetup
  labels:
    app.kubernetes.io/name: federated-meetup
type: Opaque
stringData:
  # Required: hex-encoded 32-byte Ed25519 public key.
  # Generate: openssl rand -hex 32
  HOSTD_GROUP_KEY: "CHANGEME"
  # Optional: Stripe secret key. Unset = mock payments.
  STRIPE_SECRET_KEY: ""
  # Optional: SMTP settings for email delivery.
  HOSTD_SMTP_HOST: ""
  HOSTD_SMTP_PORT: ""
  HOSTD_SMTP_USER: ""
  HOSTD_SMTP_PASS: ""
  HOSTD_SMTP_FROM: ""