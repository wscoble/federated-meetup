// SPDX-License-Identifier: MIT
//
// federated-meetup client RPC surface — the open client protobuf standard.
//
// ConnectRPC (https://connectrpc.com) over HTTP/2. Implementations:
//   - Client: any ConnectRPC client. We ship a Go reference impl (OSS).
//   - Server: any host that speaks the protocol. We ship a Go reference impl
//     (OSS for the wire layer; closed-source for the product features).
//
// Server-to-server federation traffic uses a SEPARATE WireGuard-only transport.
// It is intentionally NOT exposed here. See docs/02-PROTOCOL.md section 5.

syntax = "proto3";

package federated_meetup.v1;

import "federated_meetup/v1/state.proto";

option go_package = "github.com/sscoble/federated-meetup/proto/federated_meetup/v1;federatedmeetupv1";

// =============================================================================
// Read RPCs
// =============================================================================

message GetGroupRequest {
  // Either a public key (preferred) or a canonical name. If name, the host
  // resolves it via the public directory it has been configured with.
  oneof identifier {
    PublicKey group_key = 1;
    string canonical_name = 2;
  }
}

message GetGroupResponse {
  StateSnapshot snapshot = 1;
  // Current steward set + threshold, for client-side verification.
  repeated PublicKey stewards = 2;
  uint32 threshold = 3;
}

message GetEventRequest {
  PublicKey group_key = 1;
  string event_id = 2;
}

message GetEventResponse {
  CreateEventPayload event = 1;
  // Current RSVP list (public keys only).
  repeated PublicKey rsvps = 2;
  bool cancelled = 3;
}

message ListEventsRequest {
  PublicKey group_key = 1;
  // Pagination cursor — opaque to the client.
  string cursor = 2;
  uint32 page_size = 3;
}

message ListEventsResponse {
  repeated CreateEventPayload events = 1;
  string next_cursor = 2;
}

message ListGroupsRequest {
  // Optional substring filter on canonical name.
  string name_contains = 1;
  string cursor = 2;
  uint32 page_size = 3;
}

message ListGroupsResponse {
  message GroupSummary {
    PublicKey group_key = 1;
    string canonical_name = 2;
    string display_name = 3;
  }
  repeated GroupSummary groups = 1;
  string next_cursor = 2;
}

// =============================================================================
// Write RPCs
// =============================================================================

message SubmitTransitionRequest {
  PublicKey group_key = 1;
  Transition transition = 2;
}

message SubmitTransitionResponse {
  StateSnapshot new_snapshot = 1;
  uint64 transition_index = 2;
}

message SubmitUserActionRequest {
  PublicKey group_key = 1;
  TransitionType type = 2;
  SignedEnvelope user_envelope = 3;
  // The transition payload, embedded for convenience. Hosts re-derive this
  // from the signed bytes for verification.
  bytes transition_payload = 4;
}

message SubmitUserActionResponse {
  StateSnapshot new_snapshot = 1;
}

// =============================================================================
// Discovery
// =============================================================================

message ResolveNameRequest {
  string canonical_name = 1;
}

message ResolveNameResponse {
  PublicKey group_key = 1;
  // The hosts currently serving this group, ordered by canonicalness.
  repeated string hosts = 2;
}

// =============================================================================
// Log + Snapshot RPCs (audit H-7, H-8 — cycle 51)
// =============================================================================

message GetLogRequest {
  PublicKey group_key = 1;
  // Return transitions with index > since_cursor. 0 = from the beginning.
  uint64 since_cursor = 2;
  // Max transitions to return (server may cap). Default 100.
  uint32 limit = 3;
}

message GetLogResponse {
  repeated Transition transitions = 1;
  // Index of the next transition after this batch. Use as since_cursor
  // for the next page. 0 if no more.
  uint64 next_cursor = 2;
  // Total transitions in the group's log (at response time).
  uint64 total = 3;
}

message GetSnapshotRequest {
  PublicKey group_key = 1;
  // If set, return the snapshot at this root. If nil, return current head.
  StateRoot root = 2;
}

message GetSnapshotResponse {
  StateSnapshot snapshot = 1;
  // The transition index at which this snapshot was taken.
  uint64 transition_index = 2;
}

// =============================================================================
// Subscribe RPC (server-streaming)
// =============================================================================

message SubscribeRequest {
  PublicKey group_key = 1;
  // If non-zero, only transitions with index > since_index are streamed.
  // Clients pass the last index they saw (from SubmitTransitionResponse
  // or a prior Subscribe) to resume after disconnect.
  uint64 since_index = 2;
}

message TransitionEvent {
  // The transition that was applied.
  Transition transition = 1;
  // The new state root after applying the transition.
  StateRoot new_state_root = 2;
  // The index of this transition in the group's log.
  uint64 transition_index = 3;
  // The group's GroupID (so clients multiplexing multiple groups
  // can route without re-deriving from the transition).
  PublicKey group_key = 4;
}

// =============================================================================
// Service
// =============================================================================

service HostService {
  // Reads.
  rpc GetGroup(GetGroupRequest) returns (GetGroupResponse);
  rpc GetEvent(GetEventRequest) returns (GetEventResponse);
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
  rpc ListGroups(ListGroupsRequest) returns (ListGroupsResponse);
  rpc GetLog(GetLogRequest) returns (GetLogResponse);
  rpc GetSnapshot(GetSnapshotRequest) returns (GetSnapshotResponse);

  // Writes. SubmitTransition is for steward-signed transitions (CREATE_GROUP,
  // ADD_STEWARD, FORK, MIGRATE, etc.). SubmitUserAction is for user-signed
  // actions (RSVP, ATTEST).
  rpc SubmitTransition(SubmitTransitionRequest) returns (SubmitTransitionResponse);
  rpc SubmitUserAction(SubmitUserActionRequest) returns (SubmitUserActionResponse);

  // Discovery.
  rpc ResolveName(ResolveNameRequest) returns (ResolveNameResponse);

  // Streaming. Subscribe delivers live transition events as they are
  // applied. Clients can resume after disconnect via since_index.
  // The stream is per-group; clients wanting multiple groups open
  // one Subscribe per group.
  rpc Subscribe(SubscribeRequest) returns (stream TransitionEvent);
}
