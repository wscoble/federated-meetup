// SPDX-License-Identifier: MIT
//
// federated-meetup state schema — the open client protobuf standard.
//
// This is part of the public protocol spec (docs/02-PROTOCOL.md, section 3).
// Anyone can implement a client or host that speaks this schema. The ConnectRPC
// service in rpc.proto is the canonical client-facing surface. Server-to-server
// federation uses a separate WireGuard-only transport (NOT this RPC).

syntax = "proto3";

package federated_meetup.v1;

option go_package = "github.com/sscoble/federated-meetup/proto/federated_meetup/v1;federatedmeetupv1";

import "google/protobuf/timestamp.proto";

// =============================================================================
// Identity
// =============================================================================

// A public key wrapper. Ed25519 only for now.
message PublicKey {
  // 32 bytes for Ed25519.
  bytes raw = 1;
}

// A signature wrapper. Ed25519 produces 64-byte signatures.
message Signature {
  bytes raw = 1;
}

// A multisig envelope. A transition is valid when >= threshold of these
// signatures verify against the steward set's public keys at the snapshot the
// transition references. See docs/02-PROTOCOL.md section 3.
//
// TODO(section 11): replace with FROST threshold signatures when the crypto
// question is settled. Multisig envelope is the v1 implementation.
message Multisig {
  repeated Signature signatures = 1;
  // How many signatures are required. Set at group creation; may be changed by
  // a CHANGE_THRESHOLD transition signed by the current threshold.
  uint32 threshold = 2;
}

// =============================================================================
// State
// =============================================================================

// The key-value state of a group is a Merkle tree. We expose the root hash and
// a sorted set of entries for canonical serialization. Transitions reference
// the prior state root and apply a (small) set of changes.
message StateRoot {
  // SHA-256 of the canonical CBOR / protobuf-encoded entries.
  bytes hash = 1;
}

message StateEntry {
  string key = 1;
  bytes value = 2;
  // Monotonic per-key sequence number. Used by the host to detect out-of-order
  // writes. Not part of the cryptographic history — only used for ordering
  // within a single key.
  uint64 seq = 3;
}

message StateSnapshot {
  StateRoot root = 1;
  repeated StateEntry entries = 2;
}

// =============================================================================
// Transitions
// =============================================================================

// The canonical transition types from docs/02-PROTOCOL.md section 3.1.
// Hosts MUST implement all canonical types. Custom types may be added by
// embedding the Custom payload — other hosts will surface them opaquely.
enum TransitionType {
  TRANSITION_TYPE_UNSPECIFIED = 0;
  TRANSITION_TYPE_CREATE_GROUP = 1;
  TRANSITION_TYPE_ADD_STEWARD = 2;
  TRANSITION_TYPE_REMOVE_STEWARD = 3;
  TRANSITION_TYPE_CHANGE_THRESHOLD = 4;
  TRANSITION_TYPE_ADD_MEMBER = 5;
  TRANSITION_TYPE_REMOVE_MEMBER = 6;
  TRANSITION_TYPE_CREATE_EVENT = 7;
  TRANSITION_TYPE_UPDATE_EVENT = 8;
  TRANSITION_TYPE_CANCEL_EVENT = 9;
  TRANSITION_TYPE_RSVP = 10;
  TRANSITION_TYPE_CANCEL_RSVP = 11;
  TRANSITION_TYPE_ATTEST = 12;
  TRANSITION_TYPE_FORK = 13;
  TRANSITION_TYPE_MIGRATE = 14;

  // G1: Issue a TLS certificate to a host. Signed by the steward
  // threshold. The host uses this certificate to serve clients over
  // ConnectRPC/HTTPS. No external CA required.
  TRANSITION_TYPE_ISSUE_HOST_CERT = 20;

  // G1: Revoke a previously-issued host certificate. Signed by the
  // steward threshold. Equivalent to the host losing its right to
  // serve clients under that name.
  TRANSITION_TYPE_REVOKE_HOST_CERT = 21;

  // G2: Add a peer to the WireGuard mesh. Signed by the steward
  // threshold AND by at least one existing mesh member (co-signature).
  // Eliminates the rogue-bootstrap attack surface: you can't add a
  // peer to a mesh whose stewards don't all trust it.
  TRANSITION_TYPE_ADD_HOST_PEER = 22;

  // G2: Remove a peer from the WireGuard mesh.
  TRANSITION_TYPE_REMOVE_HOST_PEER = 23;

  // G3: Declare / change a steward's key custody tier. A steward's
  // custody tier affects whether their signature counts toward
  // threshold policy. Cold-tier keys (HSM, hardware-wallet) carry
  // more weight than hot-tier keys (live-system, scripted).
  TRANSITION_TYPE_DECLARE_STEWARD_CUSTODY = 24;

  // G6: Auto-slash a steward for equivocation. Generated by the
  // protocol when equivocation evidence is detected, NOT manually
  // authored. Signature verification requires the threshold
  // signature from the OTHER stewards (excluding the slashed one).
  TRANSITION_TYPE_SLASH_STEWARD = 25;

  // G8: Bind a directory name to a group. Signed by the steward
  // threshold. The directory can only resolve this name to this
  // group if it can present a valid NAME_BIND transition. Phishing
  // a name requires forging a threshold signature.
  TRANSITION_TYPE_NAME_BIND = 26;

  // Branch-local mutation: create a new branch within the same
  // group. Signed by the steward threshold. The new branch starts
  // from the parent's snapshot and evolves independently. See
  // BranchCreatePayload for the cheap-vs-sovereign distinction vs
  // FORK.
  TRANSITION_TYPE_BRANCH_CREATE = 27;
}

message Transition {
  // Type discriminator.
  TransitionType type = 1;

  // Reference to the prior state root. Must match the current canonical state
  // of the group on the host. Conflicts (two transitions at the same parent)
  // are resolved by group policy.
  StateRoot prior_state = 2;

  // Per-type payload. Oneof so the schema is open and forwards-compatible.
  oneof payload {
    CreateGroupPayload create_group = 10;
    AddStewardPayload add_steward = 11;
    RemoveStewardPayload remove_steward = 12;
    ChangeThresholdPayload change_threshold = 13;
    AddMemberPayload add_member = 14;
    RemoveMemberPayload remove_member = 15;
    CreateEventPayload create_event = 16;
    UpdateEventPayload update_event = 17;
    CancelEventPayload cancel_event = 18;
    RsvpPayload rsvp = 19;
    CancelRsvpPayload cancel_rsvp = 20;
    AttestPayload attest = 21;
    ForkPayload fork = 22;
    MigratePayload migrate = 23;
    BranchCreatePayload branch_create = 24;
    IssueHostCertPayload issue_host_cert = 40;
    RevokeHostCertPayload revoke_host_cert = 41;
    AddHostPeerPayload add_host_peer = 42;
    RemoveHostPeerPayload remove_host_peer = 43;
    DeclareStewardCustodyPayload declare_steward_custody = 44;
    SlashStewardPayload slash_steward = 45;
    NameBindPayload name_bind = 46;
    // Product-specific extensions. Other hosts display as opaque.
    bytes custom = 99;
  }

  // Wall-clock timestamp from the signer (host-agnostic). ADVISORY ONLY —
  // not authoritative for ordering. Hosts in the federation may have
  // wildly different clocks; use `hlc` below for consensus ordering.
  google.protobuf.Timestamp signed_at = 30;

  // Hybrid Logical Clock — the authoritative ordering primitive for this
  // transition across the federation. Total order across all hosts
  // regardless of wall-clock drift. 18 bytes (8 wall nanos BE, 2 counter
  // BE, 8 reserved for future extension). See internal/hlc.
  bytes hlc = 32;

  // Group signature. Verifies against the steward set at prior_state.
  Multisig steward_signatures = 31;

  // Branch identifier. Zero = the group's original (genesis) branch.
  // Non-zero = a branch created by FORK or by BRANCH_CREATE. Mutations
  // are branch-local: each branch has its own state KV, transition
  // log, equivocation log, and steward history. Cross-branch
  // comparisons are meaningless — branches are independent state
  // machines that share only the group's keypair.
  fixed32 branch_id = 33;
}

// =============================================================================
// Payloads
// =============================================================================

message CreateGroupPayload {
  string canonical_name = 1;
  string display_name = 2;
  // Initial stewards (must be >= threshold).
  repeated PublicKey initial_stewards = 3;
  uint32 threshold = 4;
  map<string, bytes> metadata = 5;
}

message AddStewardPayload {
  PublicKey new_steward = 1;
}

message RemoveStewardPayload {
  PublicKey steward = 1;
}

message ChangeThresholdPayload {
  uint32 new_threshold = 1;
}

message AddMemberPayload {
  PublicKey user = 1;
}

message RemoveMemberPayload {
  PublicKey user = 1;
}

message CreateEventPayload {
  string event_id = 1;
  string title = 2;
  google.protobuf.Timestamp starts_at = 3;
  google.protobuf.Timestamp ends_at = 4;
  // Free-form for now. The protocol does not constrain event location format.
  // See docs/02-PROTOCOL.md section 3.2.
  string location = 5;
  uint32 capacity = 6;
  // True if the event requires a ticket. Ticketing itself is product-layer.
  bool paid = 7;
  map<string, bytes> metadata = 8;
}

message UpdateEventPayload {
  string event_id = 1;
  // Patch fields. Hosts apply on top of the existing event record.
  map<string, bytes> patch = 2;
}

message CancelEventPayload {
  string event_id = 1;
  string reason = 2;
}

message RsvpPayload {
  string event_id = 1;
  // User signs with their own key — see SignedEnvelope below. The host verifies
  // the user signature against the user's public key (in the public directory).
  PublicKey user = 2;
}

message CancelRsvpPayload {
  string event_id = 1;
  PublicKey user = 2;
}

message AttestPayload {
  // From → To. The attestation follows the to-identity across hosts.
  PublicKey from_identity = 1;
  PublicKey to_identity = 2;
  // Schema URI. E.g. "review.positive", "review.negative",
  // "endorsement.organizer", "endorsement.speaker". Open namespace.
  string schema = 3;
  bytes payload = 4;
}

// Fork creates a new sovereign group whose initial state is the snapshot of
// the parent group at the chosen block-height. See docs/02-PROTOCOL.md section 4.
//
// In the branch-local model (protocol §3), FORK is a special case of
// BRANCH_CREATE that copies the parent's state into a new branch and
// ALSO creates a new sovereign group. Use BRANCH_CREATE alone when
// you want a new branch within the same group (no separate sovereign
// identity, no separate steward set).
message ForkPayload {
  // Snapshot of the parent group the fork starts from.
  StateSnapshot parent_snapshot = 1;
  // New group's keypair, generated by the forking steward(s).
  PublicKey new_group_key = 2;
  // Initial stewards of the new group.
  repeated PublicKey new_stewards = 3;
  uint32 new_threshold = 4;
}

// BRANCH_CREATE creates a new branch within the same group. The new
// branch starts with the parent's state at the chosen snapshot and
// evolves independently. The branch inherits the group's keypair,
// steward set, and threshold — they do NOT change at branch creation.
//
// This is the cheap, easy fork — the "I disagree with the direction
// but I still want to be part of this group" primitive. For a
// sovereign split (new keypair, new steward set, full independence),
// use FORK instead.
//
// Branch IDs are assigned by the protocol: zero is genesis, BRANCH_CREATE
// monotonically allocates the next unused ID. IDs are never reused
// within a group's lifetime.
message BranchCreatePayload {
  // Snapshot of the parent branch the new branch starts from.
  StateSnapshot parent_snapshot = 1;
  // Reason / rationale for the branch. Surfaced in BRANCH_LIST so
  // users can decide which branch to follow.
  string reason = 2;
}

// BranchInfo describes one branch in a group's forest. Returned by
// BRANCH_LIST queries. Read-only — no signing required.
message BranchInfo {
  fixed32 branch_id = 1;
  // The branch's current state root. Zero if no transitions yet.
  StateRoot head = 2;
  // Branch this one was created from. Zero for genesis.
  fixed32 parent_branch_id = 3;
  // HLC of the first transition on this branch (genesis transition
  // for branch 0, BRANCH_CREATE for others).
  bytes genesis_hlc = 4;
  // Count of transitions applied to this branch.
  uint64 transition_count = 5;
  // Reason for branch creation. Empty for branch 0.
  string reason = 6;
  // True if this branch is the canonical one the host serves by default.
  // A host may mark any branch canonical; clients pick which canonical
  // branch to follow via BRANCH_ADOPT (local, not a transition).
  bool canonical = 7;
}

// Migrate moves a group's canonical hosting from one host to another.
// See docs/02-PROTOCOL.md section 10.
message MigratePayload {
  // Human-readable host identifier. Resolution to a host key + endpoint is a
  // directory lookup.
  string new_host = 1;
  // After this deadline, the new host is canonical. The old host may continue
  // serving as a mirror.
  google.protobuf.Timestamp deadline = 2;
}

// =============================================================================
// G1 — Host certificate issuance / revocation
// =============================================================================

// ISSUE_HOST_CERT authorizes a specific host to serve this group under
// a specific hostname, using a specific TLS public key, for a specific
// validity period. The cert is signed by the steward threshold; clients
// trust the cert by trusting the steward set, not by trusting any
// external CA. The corresponding private key is held only by the host
// operator — stewards never see it.
message IssueHostCertPayload {
  // Hostname the cert is valid for (e.g. "vegas-programmers.example.com").
  string hostname = 1;
  // The host's TLS public key. The host proves possession of the
  // matching private key by signing a challenge at issuance time
  // (carried in `challenge_signature`).
  PublicKey host_tls_key = 2;
  // Not-before. Host cannot use the cert before this time.
  google.protobuf.Timestamp not_before = 3;
  // Not-after. Host MUST stop using the cert at this time. Stewards
  // issue a fresh cert (or a revocation) before expiry.
  google.protobuf.Timestamp not_after = 4;
  // The host's signature over the canonical cert bytes (proves the
  // host consented to the binding — not just the stewards).
  Signature host_challenge_signature = 5;
}

// REVOKE_HOST_CERT revokes a previously-issued cert. The cert
// identified by (hostname, host_tls_key, not_after) becomes invalid
// immediately upon Apply. Clients and hosts MUST drop any certs that
// appear in the revocation list before honoring them.
message RevokeHostCertPayload {
  string hostname = 1;
  PublicKey host_tls_key = 2;
  google.protobuf.Timestamp not_after = 3;
  // Reason for revocation. Free-form for telemetry / audit.
  string reason = 4;
}

// =============================================================================
// G2 — WireGuard mesh peer admission
// =============================================================================

// ADD_HOST_PEER adds a WireGuard peer to the mesh. The peer's wg public
// key + a static private IP are recorded. The peer is admitted only
// when the steward threshold AND at least one existing mesh member
// (co-signer) have signed. The existing-member co-signature prevents
// a hostile steward set from admitting an arbitrary wg key without
// any peer in the mesh vouching for the operation.
message AddHostPeerPayload {
  // The new peer's WireGuard public key (X25519, 32 bytes).
  PublicKey host_wg_key = 1;
  // Static private IP for this peer in the mesh's overlay space.
  // Must be unique across the mesh.
  bytes mesh_ip = 2;
  // The existing peer's wg public key that co-signs this admission.
  // The existing peer MUST be a current mesh member (verified at
  // Apply time).
  PublicKey cosigner_peer_key = 3;
  // Co-signature from the existing peer over the canonical
  // AddHostPeerPayload bytes. Proves the existing peer actually
  // ran the operation, not just that a key allegedly belonging to
  // the peer signed it.
  Signature cosigner_peer_signature = 4;
}

// REMOVE_HOST_PEER removes a peer from the mesh. The peer's wg key +
// mesh_ip combination is removed. After Apply, the peer can no longer
// decrypt or send on the mesh.
message RemoveHostPeerPayload {
  PublicKey host_wg_key = 1;
  bytes mesh_ip = 2;
}

// =============================================================================
// G3 — Steward custody declaration
// =============================================================================

// Custody tier. Ordered from most-trusted to least. The threshold
// policy can require "at least K of M signers are at tier X or
// higher" — the cold/hot distinction is encoded in the protocol, not
// in operator promises.
enum CustodyTier {
  CUSTODY_TIER_UNSPECIFIED = 0;

  // Hardware Security Module. Tamper-resistant, FIPS-validated.
  // Key never leaves the device in plaintext. Air-gapped from the
  // network except via the device's own signing interface.
  CUSTODY_TIER_HSM = 1;

  // Hardware wallet. E.g. Ledger, Trezor. Key stored in secure
  // element; signing requires physical confirmation. Air-gapped
  // when not actively signing.
  CUSTODY_TIER_HARDWARE_WALLET = 2;

  // Encrypted disk. Key stored on disk, encrypted at rest.
  // Decryption requires operator password. Susceptible to memory
  // attacks while decrypted.
  CUSTODY_TIER_ENCRYPTED_DISK = 3;

  // Live system. Key in process memory of a daemon. Susceptible
  // to host compromise, memory dumps, process introspection.
  CUSTODY_TIER_LIVE_SYSTEM = 4;

  // Scripted / CI. Key sourced from environment variables, KMS
  // fetch, or other scripted mechanism. Highest blast radius if
  // the script or CI runner is compromised.
  CUSTODY_TIER_SCRIPTED = 5;
}

// DECLARE_STEWARD_CUSTODY declares (or changes) the custody tier of
// an existing steward key. The declaration is itself signed by the
// steward — they are attesting to the operational reality of how
// their key is stored. Lies here are the steward's responsibility;
// the protocol can't audit custody from the wire.
message DeclareStewardCustodyPayload {
  PublicKey steward = 1;
  CustodyTier tier = 2;
  // Free-form justification / documentation pointer. E.g. "Ledger
  // Nano X in office safe; custody policy at
  // https://example.com/stewardship/alice".
  string justification = 3;
}

// =============================================================================
// G6 — Auto-slash for equivocation
// =============================================================================

// SLASH_STEWARD removes a steward for equivocation. The transition
// carries the equivocation evidence (two signed transitions from the
// same steward at the same prior_state with different payloads). The
// transition itself is signed by the threshold of OTHER stewards
// (the slashed steward cannot co-sign their own slashing).
message SlashStewardPayload {
  PublicKey slashed_steward = 1;
  // The prior_state at which the equivocation occurred.
  StateRoot prior_state = 2;
  // HLC of the first observed transition.
  bytes hlc_a = 3;
  // HLC of the second (conflicting) transition.
  bytes hlc_b = 4;
  // Tx hash of the first transition.
  bytes tx_hash_a = 5;
  // Tx hash of the second transition.
  bytes tx_hash_b = 6;
}

// =============================================================================
// G8 — Discovery binding
// =============================================================================

// NAME_BIND binds a directory name to this group. The directory
// MUST publish any NAME_BIND transition for a (name, group) pair
// before resolving that name to the group. Without a valid
// NAME_BIND transition, a directory's claim that "name X resolves
// to group Y" is untrusted.
message NameBindPayload {
  string name = 1;
  // Optional: the directory host the binding is published to. If
  // empty, the binding is published to all directories that want
  // to resolve this name.
  string directory_host = 2;
  // Expiry of the binding. After this time, directories MUST drop
  // the (name → group) mapping until a fresh NAME_BIND arrives.
  google.protobuf.Timestamp not_after = 3;
}

// =============================================================================
// User-signed envelopes (RSVPs, attestations)
// =============================================================================

// A user-signed envelope wraps a payload with the user's signature. The host
// verifies the signature against the user's public key.
message SignedEnvelope {
  // The canonical bytes that were signed. For RSVP, this is the RSVP payload
  // serialized with the group ID + event ID prepended (anti-replay).
  bytes message = 1;
  Signature user_signature = 2;
  PublicKey user_key = 3;
}
