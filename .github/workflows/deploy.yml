name: Deploy to k3s

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. latest, sha-abc123, v1.0.0)'
        required: false
        default: 'latest'
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to k3s
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v7

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event.inputs.image_tag }}" != "" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.workflow_run }}" != "" ]; then
            # Use the SHA from the triggering workflow
            echo "tag=sha-$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create namespace and apply manifests
        run: |
          kubectl apply -f deploy/k8s/namespace.yaml
          kubectl apply -f deploy/k8s/pvc.yaml
          kubectl apply -f deploy/k8s/configmap.yaml
          # Don't apply secret.yaml — secrets are managed out-of-band
          kubectl apply -f deploy/k8s/deployment.yaml
          kubectl apply -f deploy/k8s/service.yaml
          kubectl apply -f deploy/k8s/cloudflare-tunnel.yaml

      - name: Set image
        run: |
          kubectl -n fedmeetup set image deployment/fedmeetup \
            fedmeetup=ghcr.io/wscoble/federated-meetup:${{ steps.tag.outputs.tag }}

      - name: Rollout status
        run: |
          kubectl -n fedmeetup rollout status deployment/fedmeetup --timeout=120s

      - name: Verify health
        run: |
          kubectl -n fedmeetup port-forward svc/fedmeetup 8080:8080 &
          sleep 5
          curl -sf http://localhost:8080/healthz | grep -q ok
          echo "Health check passed!"

      - name: Show deployment status
        if: always()
        run: |
          kubectl -n fedmeetup get pods -o wide
          kubectl -n fedmeetup describe deployment fedmeetup | tail -20