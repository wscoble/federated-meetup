{{template "base" .}}
{{define "title"}}Organizer Dashboard{{end}}
{{define "content"}}
<h1 class="text-3xl font-bold mb-6">Organizer Dashboard</h1>

<div class="bg-white rounded-lg shadow p-6 mb-6">
	<h2 class="text-xl font-semibold mb-4">Create Event</h2>
	<form hx-post="/dashboard/events" hx-target="#create-result" class="space-y-4">
		<input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
		<div>
			<label for="title" class="block text-sm font-medium text-gray-700">Title</label>
			<input type="text" id="title" name="title" required maxlength="1024" class="mt-1 block w-full rounded-md border-gray-300 border px-3 py-2 text-sm">
		</div>
		<div>
			<label for="description" class="block text-sm font-medium text-gray-700">Description</label>
			<textarea id="description" name="description" rows="3" class="mt-1 block w-full rounded-md border-gray-300 border px-3 py-2 text-sm"></textarea>
		</div>
		<div>
			<label for="starts_at" class="block text-sm font-medium text-gray-700">Starts At (RFC3339)</label>
			<input type="datetime-local" id="starts_at" name="starts_at" required class="mt-1 block w-full rounded-md border-gray-300 border px-3 py-2 text-sm">
		</div>
		<div>
			<label for="location" class="block text-sm font-medium text-gray-700">Location</label>
			<input type="text" id="location" name="location" maxlength="1024" class="mt-1 block w-full rounded-md border-gray-300 border px-3 py-2 text-sm">
		</div>
		<div>
			<label for="capacity" class="block text-sm font-medium text-gray-700">Capacity</label>
			<input type="number" id="capacity" name="capacity" value="0" min="0" class="mt-1 block w-full rounded-md border-gray-300 border px-3 py-2 text-sm">
		</div>
		<button type="submit" class="bg-indigo-600 text-white rounded-md px-4 py-2 text-sm font-medium hover:bg-indigo-700">
			Create Event
		</button>
	</form>
	<div id="create-result" class="mt-4"></div>
</div>

<div class="bg-white rounded-lg shadow p-6">
	<h2 class="text-xl font-semibold mb-4">Your Events</h2>
	{{if .Events}}
	<table class="w-full text-sm">
		<thead><tr class="border-b text-left">
			<th class="py-2">Title</th><th>When</th><th>RSVPs</th>
		</tr></thead>
		<tbody>
		{{range .Events}}
		<tr class="border-b">
			<td class="py-2"><a href="/events/{{$.GroupKey}}/{{.EventID}}" class="text-indigo-600 hover:underline">{{.Title}}</a></td>
			<td class="text-gray-600">{{formatTime .StartsAt}}</td>
			<td class="text-gray-600">{{.RsvpCount}}</td>
		</tr>
		{{end}}
		</tbody>
	</table>
	{{else}}
	<p class="text-gray-500">No events yet.</p>
	{{end}}
</div>
{{end}}
