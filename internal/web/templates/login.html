{{template "base" .}}
{{define "title"}}Organizer Login{{end}}
{{define "content"}}
<div class="max-w-md">
	<h1 class="mb-6">Organizer Login</h1>

	<div class="card card-lg">
		<h2>Sign in with Token</h2>
		<form method="POST" action="/dashboard/login" class="space-y-4">
			<input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
			<div class="form-row">
				<div>
					<label for="token">Organizer Token</label>
					<input type="text" id="token" name="token" required>
				</div>
			</div>
			<button type="submit" class="btn btn-primary btn-full">
				Login
			</button>
		</form>
		<p class="mt-4 text-xs text-muted">Demo token: <code>demo-organizer-token</code></p>
	</div>
</div>
{{end}}
