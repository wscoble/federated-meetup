{{template "base" .}}
{{define "title"}}Organizer Login{{end}}
{{define "content"}}
<h1 class="text-3xl font-bold mb-6">Organizer Login</h1>
<div class="bg-white rounded-lg shadow p-6">
	<form method="POST" action="/dashboard/login" class="space-y-4">
		<input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
		<div>
			<label for="token" class="block text-sm font-medium text-gray-700">Organizer Token</label>
			<input type="text" id="token" name="token" required class="mt-1 block w-full rounded-md border-gray-300 border px-3 py-2 text-sm">
		</div>
		<button type="submit" class="bg-indigo-600 text-white rounded-md px-4 py-2 text-sm font-medium hover:bg-indigo-700">
			Login
		</button>
	</form>
</div>
{{end}}
