{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{block "title" .}}Federated Meetup{{end}}</title>
	<link rel="stylesheet" href="/static/tailwind.min.css">
	<script src="/static/htmx.min.js"></script>
	{{block "head" .}}{{end}}
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">
	<nav class="bg-white border-b border-gray-200 px-4 py-3 sticky top-0 z-10">
		<div class="max-w-5xl mx-auto flex flex-wrap items-center justify-between gap-y-2">
			<a href="/" class="flex items-center gap-2 text-xl font-bold text-indigo-600">
				<svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
				Federated Meetup
			</a>
			<div class="hidden sm:flex items-center space-x-3 sm:space-x-4 text-sm">
				<a href="/" class="text-gray-600 hover:text-indigo-600 font-medium">Discover</a>
				<a href="/my-rsvps" class="text-gray-600 hover:text-indigo-600 font-medium">My RSVPs</a>
				{{block "nav_extra" .}}{{end}}
			</div>
		</div>
	</nav>

	<main class="flex-1 max-w-5xl mx-auto w-full px-4 py-6 sm:py-8 pb-20 sm:pb-8">
		{{block "content" .}}{{end}}
	</main>

	<footer class="hidden sm:block border-t border-gray-200 py-4 text-center text-sm text-gray-500">
		Federated Meetup — open protocol, federated events
	</footer>

	<!-- Mobile bottom nav -->
	<nav class="sm:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex items-center justify-around py-2 z-10">
		<a href="/" class="flex flex-col items-center gap-0.5 text-xs text-gray-600 hover:text-indigo-600">
			<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
			Discover
		</a>
		<a href="/my-rsvps" class="flex flex-col items-center gap-0.5 text-xs text-gray-600 hover:text-indigo-600">
			<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
			RSVPs
		</a>
		{{block "mobile_nav_extra" .}}{{end}}
	</nav>
</body>
</html>{{end}}
